<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIMAT — Admin Panel</title>
  <meta property="og:title" content="GIMAT — Admin Panel">
  <meta property="og:description" content="Ma'lumot kiritish va boshqaruv paneli">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-layout" id="app"></div>

<script src="/static/js/app.js"></script>
<script>
// Check admin role
const u = getUser();
if (!u || !['super_admin', 'admin', 'operator'].includes(u.role)) {
  alert("Sizda ushbu sahifaga kirish huquqi yo'q!");
  window.location.href = "/";
}

document.getElementById('app').innerHTML = `
  ${generateSidebar('admin')}
  <div class="main-content">
    ${generateHeader("Admin Panel", "nav_admin")}
    <div class="page-content">
      
      <div class="grid-2">
        <!-- Add Data Form -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Yangi Gidrologik Ma'lumot Kiritish</h3>
          </div>
          <form id="data-form" onsubmit="submitData(event)">
            <div class="form-group">
              <label class="form-label">Stansiya</label>
              <select class="form-select" id="station_id" required>
                <option value="">Yuklanmoqda...</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Sana va Vaqt</label>
              <input type="datetime-local" class="form-input" id="date" required>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label class="form-label">Oqim (m³/s)</label>
                <input type="number" step="0.1" class="form-input" id="discharge" placeholder="Masalan: 450.5">
              </div>
              <div class="form-group">
                <label class="form-label">Yog'in (mm)</label>
                <input type="number" step="0.1" class="form-input" id="precipitation" placeholder="Masalan: 12.5">
              </div>
              <div class="form-group">
                <label class="form-label">Harorat (°C)</label>
                <input type="number" step="0.1" class="form-input" id="temperature" placeholder="Masalan: 22.0">
              </div>
              <div class="form-group">
                <label class="form-label">Qor qoplami (%)</label>
                <input type="number" step="1" max="100" min="0" class="form-input" id="snow_cover" placeholder="Masalan: 5">
              </div>
              <div class="form-group">
                <label class="form-label">Bug'lanish (mm)</label>
                <input type="number" step="0.1" class="form-input" id="evaporation" placeholder="Masalan: 3.2">
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 16px;">
              Ma'lumotni Saqlash va Tarqatish (Broadcast)
            </button>
            <div id="form-msg" style="margin-top:12px; text-align:center; font-size:14px; display:none;"></div>
          </form>
        </div>

        <!-- Simulation Panel -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Toshqin Simulyatsiyasi</h3>
          </div>
          <p style="color:var(--text-muted); font-size:14px; margin-bottom:16px;">
            Haqiqiy foydalanuvchilarga sayt o'z-o'zidan yangilanishini ko'rsatish uchun Real-time Toshqin signalini sinab ko'rish.
          </p>
          <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); padding:16px; border-radius:8px; margin-bottom:24px;">
            <p style="color:#EF4444; font-weight:600; margin-bottom:8px;">Xavfli darajani simulyatsiya qilish</p>
            <p style="font-size:13px; color:var(--text-secondary); margin-bottom:16px;">
              Bu tugma Zarafshon daryosidagi oqimni keskin ko'tarib barcha brauzerlarga tezkor XAVF signali jo'natadi.
            </p>
            <button onclick="simulateFlood()" class="btn" style="background:#EF4444; color:white; width:100%;">
              🚨 Toshqin Signalini Yuborish (Live)
            </button>
          </div>

          <div class="card-header">
            <h3 class="card-title">Bulk Ma'lumot Yuklash (Excel/CSV)</h3>
          </div>
          <p style="color:var(--text-muted); font-size:14px; margin-bottom:12px;">
            Bir necha yillik (yoki oylik) tarixiy ma'lumotlarni birdaniga bazaga yozish uchun Excel faylini yuklang. 
          </p>
          <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:6px; font-size:12px; margin-bottom:16px; font-family:monospace; color:var(--text-secondary);">
            Talab qilinadigan ustunlar: <br>
            <span style="color:#60A5FA;">station_id, date, discharge</span><br>
            Qo'shimcha ustunlar (ixtiyoriy): <br>
            <span style="color:#94A3B8;">precipitation, temperature, snow_cover, evaporation</span>
          </div>
          
          <form id="upload-form" onsubmit="uploadBulkData(event)">
            <div class="form-group">
              <input type="file" id="bulk_file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" class="form-input" required style="padding-top: 6px;">
            </div>
            <button type="submit" class="btn btn-outline" style="width:100%;">
              📁 Csv/Excel Faylni Yuklash
            </button>
            <div id="upload-msg" style="margin-top:12px; text-align:center; font-size:14px; display:none;"></div>
          </form>
        </div>
      </div>

    </div>
  </div>
`;
initResponsive();

// Initialize form
async function init() {
  const now = new Date();
  // Format for datetime-local input
  const localIso = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
  document.getElementById('date').value = localIso;

  const stations = await apiGet('/api/stations') || [];
  const select = document.getElementById('station_id');
  select.innerHTML = stations.map(s => {
    return `<option value="${s.id}">${s.name} (${s.river_name || ''})</option>`;
  }).join('');
}

async function submitData(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  const msg = document.getElementById('form-msg');
  btn.disabled = true;
  btn.textContent = "Saqlanmoqda...";
  
  const payload = {
    station_id: parseInt(document.getElementById('station_id').value),
    date: new Date(document.getElementById('date').value).toISOString(),
    discharge: document.getElementById('discharge').value ? parseFloat(document.getElementById('discharge').value) : null,
    precipitation: document.getElementById('precipitation').value ? parseFloat(document.getElementById('precipitation').value) : null,
    temperature: document.getElementById('temperature').value ? parseFloat(document.getElementById('temperature').value) : null,
    snow_cover: document.getElementById('snow_cover').value ? parseFloat(document.getElementById('snow_cover').value) : null,
    evaporation: document.getElementById('evaporation').value ? parseFloat(document.getElementById('evaporation').value) : null,
  };

  try {
    await apiPost('/api/admin/data', payload);
    msg.style.display = 'block';
    msg.style.color = 'var(--success)';
    msg.textContent = "✅ Ma'lumot qo'shildi va barcha foydalanuvchilarga tarqatildi (Live Update)!";
    setTimeout(() => { msg.style.display = 'none'; }, 5000);
  } catch (err) {
    msg.style.display = 'block';
    msg.style.color = 'var(--danger)';
    msg.textContent = "❌ Xatolik: " + err.message;
  }
  btn.disabled = false;
  btn.textContent = "Ma'lumotni Saqlash va Tarqatish (Broadcast)";
}

async function simulateFlood() {
  const p = prompt("Zarafshon oqimini qanchaga oshiraylik? (Odatda 250 dan oshsa Xavfli)", "450");
  if (!p) return;
  const val = parseFloat(p);
  
  const payload = {
    station_id: 3, // Assuming 3 is a Zarafshon station from seed_data
    date: new Date().toISOString(),
    discharge: val,
    precipitation: 25.4
  };
  
  try {
    await apiPost('/api/admin/data', payload);
    alert("Signal barcha foydalanuvchilarga jo'natildi! Dashbordni boshqa tabda tekshiring.");
  } catch (e) {
    alert("Xato: " + e.message);
  }
}

async function uploadBulkData(e) {
  e.preventDefault();
  const fileInput = document.getElementById('bulk_file');
  const btn = e.target.querySelector('button');
  const msg = document.getElementById('upload-msg');
  
  if (!fileInput.files.length) return;
  
  btn.disabled = true;
  btn.textContent = "Yuklanmoqda...";
  msg.style.display = 'none';

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);

  try {
    const token = localStorage.getItem('gimat-token');
    // Using native fetch since apiPost uses JSON payload
    const res = await fetch('/api/admin/upload-data', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`
      },
      body: formData
    });
    
    const result = await res.json();
    if (!res.ok) throw new Error(result.detail || 'Xatolik yuz berdi');

    msg.style.display = 'block';
    msg.style.color = 'var(--success)';
    msg.textContent = "✅ " + result.message;
    fileInput.value = ''; // Reset file input
    setTimeout(() => { msg.style.display = 'none'; }, 6000);
  } catch (err) {
    msg.style.display = 'block';
    msg.style.color = 'var(--danger)';
    msg.textContent = "❌ " + (err.message || 'Faylni o`qishda xatolik');
  } finally {
    btn.disabled = false;
    btn.textContent = "📁 Csv/Excel Faylni Yuklash";
  }
}

init();
</script>
</body>
</html>
