<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIMAT — Ro'yxatdan o'tish</title>
  <meta property="og:title" content="GIMAT — Gidrologik Monitoring">
  <meta property="og:description" content="O'zbekiston daryolari uchun real-time monitoring, AI prognoz va toshqin ogohlantirish tizimi">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <meta name="description" content="GIMAT platformasiga ro'yxatdan o'tish">
  <link rel="stylesheet" href="/static/css/style.css">

  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/static/img/icon.svg">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo-section">
      <div class="logo-icon">🌊</div>
      <h2>GIMAT</h2>
      <div class="subtitle">Yangi hisob yaratish</div>
    </div>
    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Ism</label>
        <input type="text" class="form-input" id="name" placeholder="Ismingiz" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Parol</label>
        <input type="password" class="form-input" id="password" placeholder="Kamida 6 ta belgi" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Til</label>
        <select class="form-select" id="user-lang">
          <option value="uz">🇺🇿 O'zbekcha</option>
          <option value="ru">🇷🇺 Русский</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <div id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
      <button type="submit" class="btn btn-primary w-full" id="btn-register">
        📝 Ro'yxatdan o'tish
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
      Hisobingiz bormi? <a href="/login" style="color:var(--primary-light);text-decoration:none;font-weight:500;">Kirish</a>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <a href="/" style="color:var(--text-muted);text-decoration:none;font-size:12px;">← Asosiy sahifaga qaytish</a>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-register');
  const errMsg = document.getElementById('error-msg');
  errMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Yaratilmoqda...';

  try {
    const result = await apiPost('/api/auth/register', {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      lang: document.getElementById('user-lang').value
    });

    localStorage.setItem('gimat-token', result.access_token);
    localStorage.setItem('gimat-user', JSON.stringify(result.user));
    window.location.href = '/dashboard';
  } catch (err) {
    errMsg.textContent = err.message || 'Xatolik yuz berdi';
    errMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = "📝 Ro'yxatdan o'tish";
  }
}
</script>
</body>
</html>
