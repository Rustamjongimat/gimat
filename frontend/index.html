<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIMAT — Gidrologik Intellektual Monitoring</title>
  <meta name="description" content="O'zbekiston daryolarining gidrologik ko'rsatkichlarini real vaqt rejimida kuzatuvchi intellektual platforma">
  <meta property="og:title" content="GIMAT — Gidrologik Monitoring">
  <meta property="og:description" content="O'zbekiston daryolari uchun real-time monitoring, AI prognoz va toshqin ogohlantirish tizimi">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="app-layout" id="app"></div>

<script src="/static/js/app.js"></script>
<script>
  document.getElementById('app').innerHTML = `
    ${generateSidebar('map')}
    <div class="main-content">
      ${generateHeader(t('map_title'), 'map_title')}
      <div class="page-content" style="padding: 16px;">
        <div class="map-container" id="map-wrapper">
          <div id="map" style="width:100%;height:100%;"></div>
          <div class="map-legend" id="map-legend">
            <h4 data-i18n="legend">${t('legend')}</h4>
            <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> <span data-i18n="level_normal">${t('level_normal')}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div> <span data-i18n="level_warning">${t('level_warning')}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> <span data-i18n="level_danger">${t('level_danger')}</span></div>
            <hr style="border-color:rgba(255,255,255,0.1);margin:8px 0;">
            <div class="legend-item"><div style="width:24px;height:3px;background:#3B82F6;border-radius:2px;"></div> <span>Asosiy daryo</span></div>
            <div class="legend-item"><div style="width:24px;height:2px;background:#818CF8;border-radius:2px;"></div> <span>Irmoq</span></div>
          </div>
          <!-- Station Info Panel -->
          <div class="station-panel" id="station-panel" style="display:none;">
            <div id="station-info"></div>
          </div>
        </div>
      </div>
    </div>
  `;
  initResponsive();

  // ─── Initialize Map ───
  const map = L.map('map', {
    center: [41.3, 64.5],
    zoom: 6,
    zoomControl: true,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18,
    subdomains: 'abcd'
  }).addTo(map);

  // ─── Load GeoJSON Rivers ───
  async function loadGeoJSON() {
    try {
      const res = await fetch('/geojson/rivers.geojson');
      const data = await res.json();

      L.geoJSON(data, {
        style: function(feature) {
          const name = feature.properties.name;
          const isMajor = ['Amudaryo', 'Sirdaryo'].includes(name);
          return {
            color: isMajor ? '#3B82F6' : '#818CF8',
            weight: isMajor ? 4 : 2.5,
            opacity: 0.8,
            smoothFactor: 2,
            dashArray: isMajor ? null : '8, 4'
          };
        },
        onEachFeature: function(feature, layer) {
          const langKey = `name_${currentLang}`;
          const name = feature.properties[langKey] || feature.properties.name;
          layer.bindTooltip(name, {
            permanent: false,
            direction: 'center',
            className: 'river-label'
          });
        }
      }).addTo(map);
    } catch (e) {
      console.warn('GeoJSON not loaded, using fallback lines', e);
      drawFallbackRivers();
    }
  }

  function drawFallbackRivers() {
    const riverLines = [
      { name: 'Amudaryo', coords: [[37.22, 67.28], [37.8, 65.7], [38.5, 63.0], [39.7, 62.5], [40.5, 61.5], [41.5, 61.0], [41.76, 60.65]], color: '#3B82F6' },
      { name: 'Sirdaryo', coords: [[40.22, 69.27], [40.5, 68.8], [40.9, 68.0], [41.0, 67.5], [40.8, 67.0]], color: '#3B82F6' },
      { name: 'Zarafshon', coords: [[39.5, 68.5], [39.52, 67.85], [39.65, 66.96], [39.8, 66.0], [39.9, 65.35]], color: '#60A5FA' },
    ];
    riverLines.forEach(r => {
      L.polyline(r.coords, { color: r.color, weight: 3, opacity: 0.7 }).addTo(map).bindTooltip(r.name);
    });
  }

  // ─── Load Country Border ───
  async function loadBorder() {
    try {
      const res = await fetch('/geojson/uzbekistan.geojson');
      const data = await res.json();
      L.geoJSON(data, {
        style: {
          color: 'rgba(96, 165, 250, 0.4)',
          fillColor: 'rgba(96, 165, 250, 0.03)',
          weight: 2,
          dashArray: '6, 4'
        }
      }).addTo(map);
    } catch (e) {
      // Fallback — hardcoded border from v1
      const uzbekBorder = [
        [37.18, 56.00], [37.37, 57.33], [38.25, 57.06], [38.86, 58.44],
        [38.27, 61.77], [37.14, 62.73], [37.37, 64.17], [37.91, 65.75],
        [39.38, 63.06], [39.52, 62.01], [40.22, 61.88], [41.23, 61.59],
        [41.73, 59.95], [42.35, 59.77], [42.14, 59.45], [42.57, 58.81],
        [44.97, 58.33], [45.58, 56.00], [37.18, 56.00]
      ];
      L.polygon(uzbekBorder, {
        color: 'rgba(96, 165, 250, 0.4)',
        fillColor: 'rgba(96, 165, 250, 0.05)',
        weight: 2, dashArray: '5, 5'
      }).addTo(map);
    }
  }

  // ─── Load Stations ───
  async function loadStations() {
    const stations = await apiGet('/api/stations');
    if (!stations) return;

    // Update alert count in sidebar
    const activeAlerts = stations.filter(s => s.alert_level === 'danger' || s.alert_level === 'warning');
    const alertBadge = document.getElementById('alert-count');
    if (alertBadge) alertBadge.textContent = activeAlerts.length;

    stations.forEach(station => {
      const color = station.alert_level === 'danger' ? '#EF4444' :
                    station.alert_level === 'warning' ? '#F59E0B' : '#22C55E';

      const marker = L.circleMarker([station.lat, station.lon], {
        radius: 9,
        fillColor: color,
        color: 'rgba(255,255,255,0.4)',
        weight: 2,
        fillOpacity: 0.9
      }).addTo(map);

      // Pulsing effect for danger/warning
      if (station.alert_level === 'danger' || station.alert_level === 'warning') {
        L.circleMarker([station.lat, station.lon], {
          radius: 16,
          fillColor: color,
          color: color,
          weight: 1,
          fillOpacity: 0.15,
          className: 'pulse-marker'
        }).addTo(map);
      }

      const langSuffix = currentLang === 'en' ? 'en' : currentLang === 'ru' ? 'ru' : 'uz';
      const stationName = station[`name_${langSuffix}`] || station.name;

      marker.bindPopup(`
        <div style="min-width: 240px; font-family: Inter, sans-serif;">
          <div style="font-weight: 700; font-size: 15px; margin-bottom: 10px; color: #F1F5F9; display: flex; align-items: center; gap: 6px;">
            <span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;"></span>
            ${stationName}
          </div>
          <div style="font-size: 12px; color: #94A3B8; margin-bottom: 8px;">
            🏔️ ${t('river')}: <strong style="color:#60A5FA">${station.river_name || '—'}</strong>
            &nbsp;·&nbsp; ${station.elevation || '—'} m
          </div>
          <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:10px; margin-bottom:10px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px;">
              <span style="color:#64748B">💧 ${t('discharge')}:</span>
              <span style="color:#F1F5F9; font-family: JetBrains Mono, monospace; font-weight:700; font-size:14px;">
                ${station.latest_discharge ? station.latest_discharge.toFixed(1) : '—'} m³/s
              </span>
              <span style="color:#64748B">📍 Lat / Lon:</span>
              <span style="color:#94A3B8; font-family: JetBrains Mono, monospace; font-size:11px;">${station.lat.toFixed(4)}, ${station.lon.toFixed(4)}</span>
              <span style="color:#64748B">📊 ${t('status')}:</span>
              <span class="badge ${alertLevelClass(station.alert_level)}" style="font-size:10px;">${alertLevelText(station.alert_level)}</span>
            </div>
          </div>
          <div style="display:flex; gap:6px;">
            <a href="/dashboard" class="btn btn-primary btn-sm" style="flex:1; font-size:11px; text-decoration:none; text-align:center;">
              📊 Dashboard
            </a>
            <a href="/data" class="btn btn-outline btn-sm" style="flex:1; font-size:11px; text-decoration:none; text-align:center;">
              📁 ${t('nav_data')}
            </a>
          </div>
        </div>
      `, { className: 'dark-popup', maxWidth: 300 });
    });
  }

  // Initialize everything
  loadBorder();
  loadGeoJSON();
  loadStations();
</script>
</body>
</html>
