<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIMAT — Kirish</title>
  <meta property="og:title" content="GIMAT — Gidrologik Monitoring">
  <meta property="og:description" content="O'zbekiston daryolari uchun real-time monitoring, AI prognoz va toshqin ogohlantirish tizimi">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <meta name="description" content="GIMAT platformasiga kirish">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo-section">
      <div class="logo-icon">🌊</div>
      <h2>GIMAT</h2>
      <div class="subtitle" id="login-subtitle">Platformaga kirish</div>
    </div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Parol</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" required>
      </div>
      <div id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;"></div>
      <button type="submit" class="btn btn-primary w-full" id="btn-login">
        🔑 Kirish
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);">
      Hisobingiz yo'qmi? <a href="/register" style="color:var(--primary-light);text-decoration:none;font-weight:500;">Ro'yxatdan o'ting</a>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <a href="/" style="color:var(--text-muted);text-decoration:none;font-size:12px;">← Asosiy sahifaga qaytish</a>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const errMsg = document.getElementById('error-msg');
  errMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Kirilmoqda...';

  try {
    const result = await apiPost('/api/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });

    localStorage.setItem('gimat-token', result.access_token);
    localStorage.setItem('gimat-user', JSON.stringify(result.user));
    window.location.href = '/dashboard';
  } catch (err) {
    errMsg.textContent = err.message || 'Email yoki parol noto\'g\'ri';
    errMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '🔑 Kirish';
  }
}
</script>
</body>
</html>
