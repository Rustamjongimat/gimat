services:
  - type: web
    name: gimat-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SECRET_KEY
        value: generateValue
      - key: DATABASE_URL
        value: sqlite:///./gimat.db
